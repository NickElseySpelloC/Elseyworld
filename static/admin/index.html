<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ElseyWorld CMS</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      const collectionNames = [
        "blog_asia_2009",
        "blog_australia_2002_trip_1",
        "blog_australia_2002_trip_2",
        "blog_australia_2009",
        "blog_moving_to_dc",
        "blog_south_pacific_1997",
        "articles_business",
        "articles_careers",
        "articles_food_travel",
        "articles_health",
        "articles_magazines",
      ];

      CMS.registerPreviewStyle(
        `
          html, body {
            margin: 0;
            padding: 0;
          }

          body {
            font-family: Georgia, serif;
            line-height: 1.7;
          }

          img {
            display: block;
            max-width: 100%;
            height: auto;
          }

          figure {
            margin: 1.5rem 0;
          }

          figure img {
            max-width: 100%;
            height: auto;
          }

          figure.float-left,
          figure.float-right {
            max-width: min(22rem, 50%);
          }

          figure.float-left {
            float: left;
            margin: 0.25rem 1.5rem 1rem 0;
          }

          figure.float-right {
            float: right;
            margin: 0.25rem 0 1rem 1.5rem;
          }

          figcaption {
            color: #555;
            font-size: 0.95rem;
            margin-top: 0.5rem;
          }
        `,
        { raw: true },
      );

      CMS.registerEditorComponent({
        id: "img-caption-float",
        label: "Float Image",
        fields: [
          {
            name: "src",
            label: "Image",
            widget: "image",
            media_folder: "",
            public_folder: "",
          },
          {
            name: "side",
            label: "Side",
            widget: "select",
            default: "right",
            options: ["left", "right"],
          },
          {
            name: "caption",
            label: "Caption",
            widget: "string",
            required: false,
          },
          {
            name: "alt",
            label: "Alt text",
            widget: "string",
            required: false,
          },
          {
            name: "width",
            label: "Width",
            widget: "string",
            required: false,
          },
          {
            name: "height",
            label: "Height",
            widget: "string",
            required: false,
          },
        ],
        pattern:
          /{{<\s*img-caption-float\s+src="([^"]+)"\s+side="([^"]+)"\s+caption="([^"]*)"\s+alt="([^"]*)"(?:\s+width="([^"]*)")?(?:\s+height="([^"]*)")?\s*>}}/m,
        fromBlock: function (match) {
          return {
            src: match[1],
            side: match[2],
            caption: match[3],
            alt: match[4],
            width: match[5] || "",
            height: match[6] || "",
          };
        },
        toBlock: function (data) {
          const attrs = [
            `src="${data.src || ""}"`,
            `side="${data.side || "right"}"`,
            `caption="${data.caption || ""}"`,
            `alt="${data.alt || ""}"`,
          ];

          if (data.width) {
            attrs.push(`width="${data.width}"`);
          }

          if (data.height) {
            attrs.push(`height="${data.height}"`);
          }

          return `{{< img-caption-float ${attrs.join(" ")} >}}`;
        },
        toPreview: function (data, getAsset) {
          const side = data.side || "right";
          const image = data.src ? getAsset(data.src) : null;
          const widthStyle = data.width ? `width:${data.width};` : "";
          const heightStyle = data.height ? `height:${data.height};` : "";

          return `
            <figure class="float-${side}" style="${widthStyle}${heightStyle}">
              <img src="${image ? image.toString() : ""}" alt="${data.alt || ""}" />
              ${data.caption ? `<figcaption>${data.caption}</figcaption>` : ""}
            </figure>
          `;
        },
      });

      const EntryPreview = createClass({
        render: function () {
          const entry = this.props.entry;
          const title = entry.getIn(["data", "title"]);
          const description = entry.getIn(["data", "description"]);
          const body = this.props.widgetFor("body");

          return h(
            "article",
            {
              style: {
                fontFamily: "Georgia, serif",
                lineHeight: "1.7",
                padding: "2rem",
              },
            },
            [
              title ? h("h1", { key: "title" }, title) : null,
              description
                ? h(
                    "p",
                    {
                      key: "description",
                      style: {
                        color: "#555",
                        fontStyle: "italic",
                        marginBottom: "1.5rem",
                      },
                    },
                    description,
                  )
                : null,
              h("div", { key: "body" }, body),
            ],
          );
        },
      });

      collectionNames.forEach(function (name) {
        CMS.registerPreviewTemplate(name, EntryPreview);
      });
    </script>
  </body>
</html>
