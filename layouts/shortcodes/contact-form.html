{{ $key     := .Get "access_key" }}
{{ $subject := .Get "subject" | default "New message from ElseyWorld" }}

<form
  id="ew-contact-form"
  action="https://api.web3forms.com/submit"
  method="POST"
  style="margin-top:2rem; display:flex; flex-direction:column; gap:1.25rem; max-width:36rem;"
>
  <input type="hidden" name="access_key" value="{{ $key }}">
  <input type="hidden" name="subject"    value="{{ $subject }}">
  <!-- honeypot -->
  <input type="checkbox" name="botcheck" style="display:none" tabindex="-1" autocomplete="off">

  <div style="display:flex; flex-direction:column; gap:0.35rem;">
    <label for="ew-cf-name" style="font-size:0.875rem; font-weight:600;">Name</label>
    <input
      type="text" id="ew-cf-name" name="name" required
      style="padding:0.5rem 0.75rem; border:1px solid #d1d5db; border-radius:0.375rem; font-size:1rem; width:100%; background:transparent;"
    >
  </div>

  <div style="display:flex; flex-direction:column; gap:0.35rem;">
    <label for="ew-cf-email" style="font-size:0.875rem; font-weight:600;">Email</label>
    <input
      type="email" id="ew-cf-email" name="email" required
      style="padding:0.5rem 0.75rem; border:1px solid #d1d5db; border-radius:0.375rem; font-size:1rem; width:100%; background:transparent;"
    >
  </div>

  <div style="display:flex; flex-direction:column; gap:0.35rem;">
    <label for="ew-cf-message" style="font-size:0.875rem; font-weight:600;">Message</label>
    <textarea
      id="ew-cf-message" name="message" required rows="5"
      style="padding:0.5rem 0.75rem; border:1px solid #d1d5db; border-radius:0.375rem; font-size:1rem; width:100%; background:transparent; resize:vertical;"
    ></textarea>
  </div>

  <div>
    <button
      type="submit"
      style="padding:0.5rem 1.5rem; background-color:rgb(var(--color-primary-600, 37 99 235)); color:#fff; border:none; border-radius:0.375rem; font-size:1rem; font-weight:600; cursor:pointer;"
    >
      Send Message
    </button>
  </div>

  <div
    id="ew-cf-result"
    role="alert"
    style="display:none; padding:0.75rem 1rem; border-radius:0.375rem; font-size:0.875rem;"
  ></div>
</form>

<script>
(function () {
  var form   = document.getElementById('ew-contact-form');
  var result = document.getElementById('ew-cf-result');

  form.addEventListener('submit', function (e) {
    e.preventDefault();
    var btn = form.querySelector('button[type="submit"]');
    btn.disabled    = true;
    btn.textContent = 'Sending\u2026';

    var obj = {};
    new FormData(form).forEach(function (v, k) { obj[k] = v; });

    fetch('https://api.web3forms.com/submit', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body:    JSON.stringify(obj)
    })
    .then(function (r) {
      return r.json().then(function (j) { return { status: r.status, body: j }; });
    })
    .then(function (r) {
      result.style.display = 'block';
      if (r.status === 200) {
        result.style.backgroundColor = '#d1fae5';
        result.style.color           = '#065f46';
        result.textContent           = "Thanks for your message! I\u2019ll be in touch soon.";
        form.reset();
      } else {
        result.style.backgroundColor = '#fee2e2';
        result.style.color           = '#991b1b';
        result.textContent           = r.body.message || 'Something went wrong. Please try again.';
      }
    })
    .catch(function () {
      result.style.display           = 'block';
      result.style.backgroundColor   = '#fee2e2';
      result.style.color             = '#991b1b';
      result.textContent             = 'Network error. Please check your connection and try again.';
    })
    .finally(function () {
      btn.disabled    = false;
      btn.textContent = 'Send Message';
    });
  });
})();
</script>
