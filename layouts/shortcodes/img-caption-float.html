<figure class="float-{{ .Get "side" }}">
    {{ with .Get "href" }}
        <a href="{{ . }}">
    {{ end }}
    <img src="{{ .Get "src" }}" 
         alt="{{ .Get "alt" }}"
         width="{{ .Get "width" }}"
         height="{{ .Get "height" }}">
    {{ with .Get "href" }}
        </a>
    {{ end }}
    <figcaption>
        {{ .Get "caption" }}
    </figcaption>
</figure>
