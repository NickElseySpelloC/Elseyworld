<div style="display:flex; align-items:flex-start; gap:1rem;">
  <div style="flex-shrink:0;">
    <form action="https://www.paypal.com/donate" method="post" target="_top" style="margin:0;">
      <input type="hidden" name="business" value="25X8R9K27D8X8" />
      <input type="hidden" name="no_recurring" value="1" />
      <input type="hidden" name="item_name" value="{{ .Get `message` }}" />
      <input type="hidden" name="currency_code" value="AUD" />
      <input type="image" src="https://www.paypalobjects.com/en_AU/i/btn/btn_donateCC_LG.gif" border="0" name="submit" title="PayPal - The safer, easier way to pay online!" alt="Donate with PayPal button" style="display:block;" />
      <img alt="" border="0" src="https://www.paypal.com/en_AU/i/scr/pixel.gif" width="1" height="1" style="display:block; margin:0;" />
    </form>
  </div>
  {{- with .Get "message" }}<p style="margin:0;">{{ . }}</p>{{ end -}}
</div>
