name: Deploy Hugo site to GitHub Pages
on:
  push:
    branches:
      - main
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
          - name: Checkout
            uses: actions/checkout@v4
            with:
              submodules: recursive

          - name: Setup Hugo
            run: |
              wget -O hugo.deb https://github.com/gohugoio/hugo/releases/download/v0.159.1/hugo_extended_0.159.1_linux-amd64.deb
              sudo dpkg -i hugo.deb

          - name: Build
            run: hugo --minify --baseURL "https://nickelseyspelloc.github.io/Elseyworld/"

          - name: Upload artifact
            uses: actions/upload-pages-artifact@v3
            with:
              path: ./public
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
